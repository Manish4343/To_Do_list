<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Todo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#141e30; --bg2:#243b55; --card:rgba(255,255,255,0.08);
  --text:#fff; --muted:#b9c0cc; --primary:#6c5ce7; --danger:#ff5c5c; --ok:#2ecc71;
}

body{
  margin:0; font-family:'Poppins',sans-serif; color:var(--text);
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  display:flex; align-items:center; justify-content:center; height:100vh;
}

.app{
  width:380px; padding:20px; border-radius:22px; background:var(--card);
  backdrop-filter: blur(16px); box-shadow:0 20px 50px rgba(0,0,0,.5);
}

.header{display:flex; justify-content:space-between; align-items:center;}
.header h1{margin:0; font-size:1.4rem}
.theme{cursor:pointer; font-size:1.2rem}

.quote{margin:8px 0 14px; font-size:.85rem; color:var(--muted); text-align:center}

.controls{display:flex; gap:8px}
input{
  flex:1; padding:10px; border-radius:12px; border:none; outline:none;
}
select,button{
  border:none; border-radius:12px; padding:10px; cursor:pointer;
}
.add{background:var(--primary); color:#fff}

.filters{display:flex; gap:6px; margin-top:10px}
.filters button{flex:1; background:rgba(255,255,255,.12); color:#fff}
.filters .active{background:var(--primary)}

ul{list-style:none; padding:0; margin:14px 0 0}
li{
  display:flex; align-items:center; justify-content:space-between;
  padding:10px; margin-bottom:8px; border-radius:12px;
  background:rgba(255,255,255,.12); transition:.2s
}
li:hover{transform:scale(1.02)}

.left{display:flex; align-items:center; gap:8px}
.priority{font-size:.7rem; padding:2px 6px; border-radius:6px}
.low{background:#00b894} .med{background:#fdcb6e} .high{background:#e17055}

.completed span{text-decoration:line-through; opacity:.6}

.actions button{margin-left:6px}
.del{background:var(--danger); color:#fff}

.footer{display:flex; justify-content:space-between; font-size:.8rem; color:var(--muted)}

</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>🚀 Todo Pro</h1>
    <div class="theme" onclick="toggleTheme()">🌙</div>
  </div>

  <div class="quote">"Focus on progress, not perfection"</div>

  <div class="controls">
    <input id="taskInput" placeholder="Add task...">
    <select id="priority">
      <option value="low">Low</option>
      <option value="med">Medium</option>
      <option value="high">High</option>
    </select>
    <button class="add" onclick="addTask()">+</button>
  </div>

  <div class="filters">
    <button onclick="setFilter('all')" class="active" id="f-all">All</button>
    <button onclick="setFilter('active')" id="f-active">Active</button>
    <button onclick="setFilter('done')" id="f-done">Done</button>
  </div>

  <ul id="list"></ul>

  <div class="footer">
    <span id="count">0 tasks</span>
    <button onclick="clearAll()">Clear</button>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('tasks')||'[]');
let filter='all';

function save(){ localStorage.setItem('tasks', JSON.stringify(tasks)); render(); }

function addTask(){
  const text = taskInput.value.trim();
  if(!text) return;
  tasks.push({text, done:false, p:priority.value});
  taskInput.value=''; save();
}

function toggle(i){ tasks[i].done=!tasks[i].done; save(); }
function del(i){ tasks.splice(i,1); save(); }
function clearAll(){ tasks=[]; save(); }

function setFilter(f){ filter=f;
  document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
  document.getElementById('f-'+f).classList.add('active');
  render();
}

function render(){
  const ul = document.getElementById('list'); ul.innerHTML='';
  let filtered = tasks.filter(t=> filter==='all' || (filter==='done'?t.done:!t.done));

  filtered.forEach((t,i)=>{
    const li=document.createElement('li');
    li.className = t.done ? 'completed' : '';

    li.innerHTML=`
      <div class='left'>
        <input type='checkbox' ${t.done?'checked':''} onclick='toggle(${i})'>
        <span>${t.text}</span>
        <span class='priority ${t.p}'>${t.p}</span>
      </div>
      <div class='actions'>
        <button class='del' onclick='del(${i})'>X</button>
      </div>`;

    ul.appendChild(li);
  });

  document.getElementById('count').innerText = tasks.length + ' tasks';
}

function toggleTheme(){
  document.body.classList.toggle('light');
}

render();
</script>

</body>
</html>
